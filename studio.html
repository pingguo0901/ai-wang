<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作室 · 星域集团</title>
<style>
:root{--bg:#030712;--card:transparent;--primary:#6c5ce7;--accent:#00d2ff;--text:#e0e0f0;--text2:#7a85a0;--text3:#4a5570;--radius:14px;--sidebar-w:240px;--server-w:72px;--channels-w:240px;--green:#22c55e;--orange:#f59e0b;--red:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow:hidden}
@keyframes twinkle{0%,100%{opacity:.1}30%{opacity:.9}60%{opacity:.3}}
@keyframes ledBlink{0%,100%{opacity:.05}25%{opacity:.9}45%{opacity:.15}70%{opacity:.8}85%{opacity:.2}}
@keyframes dotGlow{0%,100%{box-shadow:0 0 4px rgba(0,210,255,.6),0 0 10px rgba(0,210,255,.3)}50%{box-shadow:0 0 8px #0f0,0 0 20px rgba(0,210,255,.6)}}
@keyframes breatheGlow{0%,100%{opacity:.25;box-shadow:0 0 6px rgba(0,210,255,.4),0 0 16px rgba(0,210,255,.15)}50%{opacity:1;box-shadow:0 0 16px rgba(0,210,255,.9),0 0 40px rgba(0,210,255,.5),0 0 60px rgba(0,210,255,.2)}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.bg-stars{position:fixed;inset:0;pointer-events:none;z-index:0;background:linear-gradient(rgba(0,210,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,210,255,.03) 1px,transparent 1px),radial-gradient(ellipse at 20% 10%,rgba(0,210,255,.06)0%,transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(108,92,231,.04)0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(0,180,255,.03)0%,transparent 60%);background-size:40px 40px,40px 40px,100% 100%,100% 100%,100% 100%}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:transparent;z-index:10;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid rgba(0,210,255,.15);position:relative}
.sidebar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,210,255,.5),rgba(0,240,255,.7),rgba(0,210,255,.5),transparent);box-shadow:0 0 6px rgba(0,210,255,.3);z-index:2}
.sidebar-logo{padding:24px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(0,210,255,.1);cursor:pointer}
.sidebar-logo .icon{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--primary),#a855f7);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 6px 20px rgba(108,92,231,.3)}
.sidebar-logo h2{font-size:16px;font-weight:700}
.sidebar-logo span{font-size:10px;color:var(--text2);display:block}
.sidebar-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
.nav-link{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:var(--text2);font-size:14px;cursor:pointer;transition:.2s;text-decoration:none}
.nav-link:hover{background:rgba(255,255,255,.03);color:var(--text)}
.nav-link.active{background:rgba(108,92,231,.12);color:var(--primary);font-weight:600}
.nav-section{font-size:10px;color:var(--text3);padding:16px 14px 4px;text-transform:uppercase;letter-spacing:1.5px}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,.04)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer}
.user-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#0098db);display:flex;align-items:center;justify-content:center;font-size:16px}
.user-info h4{font-size:13px}
.user-info span{font-size:11px;color:var(--text2)}
.server-bar{width:var(--server-w);background:transparent;display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 8px;z-index:8;border-right:1px solid rgba(0,210,255,.15);overflow-y:auto;flex-shrink:0}
.server-bar .divider{width:36px;height:1px;background:rgba(255,255,255,.06);border-radius:1px;margin:4px 0}
.server-icon{width:48px;height:48px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all .4s cubic-bezier(.25,1,.5,1);position:relative;flex-shrink:0;color:var(--text2);background:transparent;overflow:hidden;border:1px solid rgba(0,210,255,.15);box-shadow:inset 0 0 10px rgba(0,210,255,.04)}
.server-icon::before,.server-icon::after{content:'';position:absolute;width:5px;height:5px;border:1.2px solid rgba(0,210,255,.4);transition:all .4s ease}
.server-icon::before{top:0;left:0;border-right:none;border-bottom:none}
.server-icon::after{bottom:0;right:0;border-left:none;border-top:none}
.server-icon:hover{color:var(--text);background:rgba(0,210,255,.08);border-color:rgba(0,210,255,.5);box-shadow:inset 0 0 16px rgba(0,210,255,.15),0 0 18px rgba(0,210,255,.15)}
.server-icon:hover::before{transform:translate(-1px,-1px);filter:drop-shadow(0 0 3px #00d2ff);border-color:rgba(0,210,255,.7)}
.server-icon:hover::after{transform:translate(1px,1px);filter:drop-shadow(0 0 3px #00d2ff);border-color:rgba(0,210,255,.7)}
.server-icon.active{background:rgba(108,92,231,.15);color:#fff;border-color:rgba(108,92,231,.5);box-shadow:inset 0 0 16px rgba(108,92,231,.2),0 0 20px rgba(108,92,231,.25)}
.server-icon.active::before,.server-icon.active::after{border-color:rgba(168,85,247,.6)}
.server-icon .server-badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--red);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid var(--bg)}
.server-icon .server-indicator{position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:4px;height:20px;border-radius:0 4px 4px 0;background:var(--text);transition:.2s;opacity:0}
.server-icon.active .server-indicator{opacity:1;background:var(--accent)}
.channels{width:var(--channels-w);background:transparent;border-right:1px solid rgba(0,210,255,.15);display:flex;flex-direction:column;z-index:5}
.channels-header{padding:16px;border-bottom:1px solid rgba(0,210,255,.08);background:transparent;min-height:52px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:visible}
.channels-header::after{content:'';position:absolute;bottom:-1px;left:5%;right:5%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,210,255,.5),rgba(0,240,255,.8),rgba(0,210,255,.5),transparent);box-shadow:0 0 8px rgba(0,210,255,.4),0 0 20px rgba(0,210,255,.15)}
.channels-header h3{font-size:14px;font-weight:600}
.channel-list{flex:1;overflow-y:auto;padding:4px 8px}
.channel-section{font-size:11px;color:var(--text3);padding:14px 8px 4px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none}
.channel-section .arrow{font-size:8px;transition:transform .2s;display:inline-block}
.channel-section.collapsed .arrow{transform:rotate(-90deg)}
.channel-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:4px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .4s cubic-bezier(.25,1,.5,1);position:relative;border:1px solid rgba(0,210,255,.12);background:transparent;overflow:hidden;box-shadow:inset 0 0 8px rgba(0,210,255,.04)}
.channel-item::before,.channel-item::after{content:'';position:absolute;width:5px;height:5px;border:1.2px solid rgba(0,210,255,.4);transition:.4s ease}
.channel-item::before{top:0;left:0;border-right:none;border-bottom:none}
.channel-item::after{bottom:0;right:0;border-left:none;border-top:none}
.channel-item:hover{background:rgba(0,210,255,.06);color:var(--text);border-color:rgba(0,210,255,.4);box-shadow:inset 0 0 12px rgba(0,210,255,.12),0 0 14px rgba(0,210,255,.1)}
.channel-item:hover::before{transform:translate(-1px,-1px);filter:drop-shadow(0 0 3px #00d2ff);border-color:rgba(0,210,255,.7)}
.channel-item:hover::after{transform:translate(1px,1px);filter:drop-shadow(0 0 3px #00d2ff);border-color:rgba(0,210,255,.7)}
.channel-item.active{background:rgba(108,92,231,.12);color:var(--text);font-weight:500;border-color:rgba(108,92,231,.4);box-shadow:inset 0 0 12px rgba(108,92,231,.1),0 0 14px rgba(108,92,231,.1)}
.channel-item.active::before,.channel-item.active::after{border-color:rgba(108,92,231,.6)}
.ch-icon{font-size:16px;flex-shrink:0;width:24px;text-align:center}
.ch-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-badge{background:var(--red);color:#fff;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600;flex-shrink:0}
.ch-gear{font-size:12px;color:var(--text3);opacity:0;transition:opacity .15s;flex-shrink:0;cursor:pointer;padding:2px 4px;border-radius:4px}
.channel-item:hover .ch-gear{opacity:1}
.ch-gear:hover{color:var(--text)}
.add-btn{width:28px;height:28px;border-radius:4px;background:transparent;position:relative;overflow:hidden;border:1px solid rgba(0,210,255,.25);color:rgba(0,210,255,.7);font-size:16px;cursor:pointer;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .4s cubic-bezier(.25,1,.5,1);box-shadow:inset 0 0 8px rgba(0,210,255,.06)}
.add-btn::before,.add-btn::after{content:'';position:absolute;width:4px;height:4px;border:1px solid rgba(0,210,255,.4);transition:.4s ease}
.add-btn::before{top:0;left:0;border-right:none;border-bottom:none}
.add-btn::after{bottom:0;right:0;border-left:none;border-top:none}
.add-btn:hover{background:rgba(0,210,255,.1);border-color:rgba(0,210,255,.7);color:#fff;box-shadow:inset 0 0 14px rgba(0,210,255,.15),0 0 16px rgba(0,210,255,.15)}
.add-btn:hover::before{transform:translate(-1px,-1px);filter:drop-shadow(0 0 2px #00d2ff);border-color:rgba(0,210,255,.7)}
.add-btn:hover::after{transform:translate(1px,1px);filter:drop-shadow(0 0 2px #00d2ff);border-color:rgba(0,210,255,.7)}
.ch-dropdown{position:absolute;top:calc(100% - 4px);right:12px;background:rgba(3,7,18,.7);backdrop-filter:blur(8px);border-radius:10px;border:1px solid rgba(0,210,255,.12);box-shadow:0 8px 30px rgba(0,0,0,.6);z-index:50;min-width:160px;overflow:hidden;display:none}
.ch-dropdown.show{display:block}
.ch-dropdown-item{padding:11px 16px;font-size:13px;cursor:pointer;color:var(--text2);transition:.15s;display:flex;align-items:center;gap:8px}
.ch-dropdown-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.ch-dropdown-divider{height:1px;background:rgba(255,255,255,.05);margin:2px 0}
.chat-main{flex:1;display:flex;flex-direction:column;background:transparent;min-width:0;position:relative}
.chat-header{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid rgba(0,210,255,.08);background:transparent;min-height:52px;gap:12px;position:relative;overflow:visible}
.chat-header::after{content:'';position:absolute;bottom:-1px;left:5%;right:5%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,210,255,.5),rgba(0,240,255,.8),rgba(0,210,255,.5),transparent);box-shadow:0 0 8px rgba(0,210,255,.4),0 0 20px rgba(0,210,255,.15)}
.chat-header .ch-title{flex:1}
.chat-header .ch-title h3{font-size:15px;font-weight:600}
.chat-header .ch-title span{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.chat-header-actions{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:4px;background:transparent;position:relative;overflow:hidden;border:1px solid rgba(0,210,255,.2);color:var(--text2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .4s cubic-bezier(.25,1,.5,1);box-shadow:inset 0 0 8px rgba(0,210,255,.04)}
.icon-btn::before,.icon-btn::after{content:'';position:absolute;width:4px;height:4px;border:1.2px solid rgba(0,210,255,.4);transition:.4s ease}
.icon-btn::before{top:0;left:0;border-right:none;border-bottom:none}
.icon-btn::after{bottom:0;right:0;border-left:none;border-top:none}
.icon-btn:hover{background:rgba(0,210,255,.08);border-color:rgba(0,210,255,.6);color:var(--text);box-shadow:inset 0 0 12px rgba(0,210,255,.15),0 0 16px rgba(0,210,255,.15)}
.icon-btn:hover::before{transform:translate(-1px,-1px);filter:drop-shadow(0 0 3px #00d2ff);border-color:rgba(0,210,255,.7)}
.icon-btn:hover::after{transform:translate(1px,1px);filter:drop-shadow(0 0 3px #00d2ff);border-color:rgba(0,210,255,.7)}
.messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;background:transparent}
.msg-date-divider{text-align:center;font-size:11px;color:var(--text3);margin:8px 0;position:relative}
.msg-date-divider::before,.msg-date-divider::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:rgba(255,255,255,.04)}
.msg-date-divider::before{left:0}
.msg-date-divider::after{right:0}
.msg-row{display:flex;gap:12px;align-items:flex-start;max-width:75%}
.msg-row.self{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px}
.msg-avatar.purple{background:linear-gradient(135deg,#6c5ce7,#a855f7)}
.msg-avatar.blue{background:linear-gradient(135deg,#00d2ff,#0098db)}
.msg-avatar.green{background:linear-gradient(135deg,#22c55e,#16a34a)}
.msg-avatar.orange{background:linear-gradient(135deg,#f59e0b,#d97706)}
.msg-bubble{background:transparent;border-radius:var(--radius);padding:14px 18px;border:1px solid rgba(0,210,255,.15);position:relative;overflow:hidden;transition:.2s}
.msg-bubble::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,210,255,.5),rgba(0,240,255,.7),rgba(0,210,255,.5),transparent);box-shadow:0 0 6px rgba(0,210,255,.3)}
.msg-bubble:hover{border-color:rgba(0,210,255,.35);box-shadow:0 4px 20px rgba(0,210,255,.08)}
.msg-row.self .msg-bubble{border-color:rgba(108,92,231,.25)}
.msg-row.self .msg-bubble::after{background:linear-gradient(90deg,transparent,rgba(108,92,231,.5),rgba(168,85,247,.7),rgba(108,92,231,.5),transparent);box-shadow:0 0 6px rgba(108,92,231,.3)}
.msg-sender{font-size:12px;font-weight:600;margin-bottom:3px;color:var(--accent)}
.msg-row.self .msg-sender{color:var(--primary)}
.msg-text{font-size:14px;line-height:1.6}
.msg-time{font-size:10px;color:var(--text3);margin-top:6px;text-align:right}
.msg-row.self .msg-time{text-align:left}
.msg-status{display:flex;gap:3px;align-items:center;justify-content:flex-end}
.msg-status .sdot{width:5px;height:5px;border-radius:50%;background:rgba(0,210,255,.35);transition:.3s}
.msg-status.read .sdot{background:var(--accent);box-shadow:0 0 6px rgba(0,210,255,.8),0 0 14px rgba(0,210,255,.4);animation:dotGlow 2s ease-in-out infinite}
.chat-input-area{padding:12px 24px 20px;border-top:1px solid rgba(0,210,255,.08);display:flex;gap:12px;align-items:center;position:relative;overflow:visible;background:transparent}
.chat-input-area::before{content:'';position:absolute;top:0;left:5%;right:5%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,210,255,.3),rgba(0,240,255,.5),rgba(0,210,255,.3),transparent);box-shadow:0 0 4px rgba(0,210,255,.2)}
.chat-input-area::after{content:'';position:absolute;bottom:-1px;left:5%;right:5%;height:2px;background:linear-gradient(90deg,transparent,rgba(0,210,255,.6),rgba(0,240,255,1),rgba(0,210,255,.6),transparent);box-shadow:0 0 12px rgba(0,210,255,.6),0 0 30px rgba(0,210,255,.35),0 0 50px rgba(0,210,255,.15);animation:breatheGlow 2s ease-in-out infinite}
.input-wrapper{flex:1;position:relative;display:flex}
.input-wrapper::before,.input-wrapper::after{content:'';position:absolute;width:8px;height:8px;z-index:2;pointer-events:none;border:1.5px solid rgba(0,210,255,.5);transition:.3s ease}
.input-wrapper::before{top:0;left:0;border-right:none;border-bottom:none}
.input-wrapper::after{bottom:0;right:0;border-left:none;border-top:none}
.chat-input-area:focus-within .input-wrapper::before,.chat-input-area:focus-within .input-wrapper::after{border-color:rgba(0,240,255,.9);filter:drop-shadow(0 0 4px #00d2ff)}
.chat-input-area:focus-within .input-wrapper::before{transform:translate(-2px,-2px)}
.chat-input-area:focus-within .input-wrapper::after{transform:translate(2px,2px)}
.chat-input-area textarea{width:100%;background:transparent;border:1px solid rgba(0,210,255,.2);border-radius:4px;padding:12px 16px;color:var(--text);font-size:14px;outline:none;resize:none;font-family:inherit;height:42px;line-height:1.4;transition:.3s;overflow:hidden;box-shadow:inset 0 0 12px rgba(0,210,255,.06)}
.chat-input-area textarea:focus{border-color:rgba(0,210,255,.6);box-shadow:inset 0 0 20px rgba(0,210,255,.15),0 0 20px rgba(0,210,255,.15)}
.chat-input-area textarea::placeholder{color:var(--text3)}
.send-btn{width:42px;height:42px;border-radius:4px;background:transparent;position:relative;overflow:hidden;border:1px solid rgba(0,210,255,.25);color:rgba(0,210,255,.8);font-size:18px;cursor:pointer;flex-shrink:0;transition:all .4s cubic-bezier(.25,1,.5,1);box-shadow:inset 0 0 10px rgba(0,210,255,.08);display:flex;align-items:center;justify-content:center}
.send-btn::before,.send-btn::after{content:'';position:absolute;width:5px;height:5px;border:1.2px solid rgba(0,210,255,.5);transition:.4s ease}
.send-btn::before{top:0;left:0;border-right:none;border-bottom:none}
.send-btn::after{bottom:0;right:0;border-left:none;border-top:none}
.send-btn:hover{background:rgba(0,210,255,.1);border-color:rgba(0,210,255,.7);color:#fff;transform:scale(1.05);box-shadow:inset 0 0 16px rgba(0,210,255,.25),0 0 22px rgba(0,210,255,.35)}
.send-btn:hover::before{transform:translate(-1px,-1px);filter:drop-shadow(0 0 3px #00d2ff);border-color:rgba(0,210,255,.7)}
.send-btn:hover::after{transform:translate(1px,1px);filter:drop-shadow(0 0 3px #00d2ff);border-color:rgba(0,210,255,.7)}
.upload-popup{position:absolute;bottom:60px;left:18px;background:rgba(3,7,18,.7);backdrop-filter:blur(8px);border-radius:10px;border:1px solid rgba(0,210,255,.12);box-shadow:0 8px 30px rgba(0,0,0,.6);z-index:50;overflow:hidden;display:none;min-width:140px}
.upload-popup.show{display:block}
.upload-popup-item{padding:11px 16px;font-size:13px;cursor:pointer;color:var(--text2);transition:.15s;display:flex;align-items:center;gap:10px}
.upload-popup-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.members{width:200px;background:transparent;flex-shrink:0;border-left:1px solid rgba(0,210,255,.08);padding:16px 12px;overflow-y:auto}
.members h4{font-size:11px;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.member-item{display:flex;align-items:center;gap:8px;padding:7px 6px;border-radius:8px;cursor:pointer;font-size:12px;transition:background .2s}
.member-item:hover{background:rgba(255,255,255,.03)}
.member-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.member-dot.online{background:var(--green)}
.member-dot.offline{background:var(--text3)}
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:20px;width:440px;max-width:90vw;border:1px solid rgba(255,255,255,.06);box-shadow:0 20px 60px rgba(0,0,0,.5);overflow:hidden;animation:slideUp .25s ease}
.modal-header{padding:24px 24px 0;text-align:center}
.modal-header h2{font-size:20px;font-weight:700}
.modal-header p{font-size:13px;color:var(--text2);margin-top:6px}
.modal-body{padding:24px}
.modal-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:block}
.modal-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 16px;color:var(--text);font-size:14px;outline:none;font-family:inherit;margin-bottom:18px}
.modal-input:focus{border-color:var(--primary)}
.modal-input::placeholder{color:var(--text3)}
.upload-area{width:64px;height:64px;border:2px dashed rgba(255,255,255,.15);border-radius:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;margin:0 auto 18px;position:relative;overflow:hidden;background:rgba(255,255,255,.02)}
.upload-area:hover{border-color:rgba(108,92,231,.4)}
.upload-placeholder{text-align:center;color:var(--text3)}
.upload-preview{position:absolute;inset:0;display:none;align-items:center;justify-content:center}
.upload-preview.show{display:flex}

function selectChannel(channelId,channelName){currentChannel=channelId;document.querySelectorAll('.channel-item').forEach(function(c){c.classList.remove('active')});var t=document.querySelector('[data-channel="'+channelId+'"]');if(t)t.classList.add('active');document.getElementById('chatTitle').textContent=channelName;if(channelId.indexOf('meet-')===0){document.getElementById('chat-header-actions').style.display='none';document.getElementById('chat-input-area').style.display='none';renderVoiceCall()}else{document.getElementById('chat-header-actions').style.display='flex';document.getElementById('chat-input-area').style.display='flex';var vc=document.getElementById('voiceCallBtn'),vd=document.getElementById('videoCallBtn');var bar=document.getElementById('voiceControlBar');if(bar)bar.style.display='none';if(window.voiceTimer)clearInterval(window.voiceTimer);renderMessages()}}
function renderChannels(){var s=serverData[currentServer];document.getElementById('serverName').textContent=s.name;document.getElementById('onlineCount').textContent=s.members.online;document.getElementById('memberCount').textContent=s.members.online;var first=null,meet=[],html='';for(var sec in s.channels){var chs=s.channels[sec],reg=[];for(var i=0;i<chs.length;i++){var ch=chs[i];if(ch.id&&ch.id.indexOf('meet-')===0)meet.push(ch);else reg.push(ch)}if(reg.length>0){html+='<div class="channel-section" onclick="toggleSection(this)"><span class="arrow">▼</span> '+sec+'</div>';for(var j=0;j<reg.length;j++){var c=reg[j];if(!first)first=c;var act=currentChannel===c.id?' active':'';html+='<div class="channel-item'+act+'" data-channel="'+c.id+'" data-channel-name="'+c.icon+' '+c.name+'"><span class="ch-icon">'+c.icon+'</span><span class="ch-name">'+c.name+'</span>'+(c.badge?'<span class="ch-badge">'+c.badge+'</span>':'')+(currentServer!=='dm'?'<span class="ch-gear" data-channel-id="'+c.id+'" data-channel-name="'+c.name+'">⚙️</span>':'')+'</div>'}}}if(currentServer!=='dm'){html+='<div class="channel-section" onclick="toggleSection(this)"><span class="arrow">▼</span> 📞 会议室列表</div>';if(meet.length>0){for(var k=0;k<meet.length;k++){var mc=meet[k];if(!first)first=mc;var mact=currentChannel===mc.id?' active':'';html+='<div class="channel-item'+mact+'" data-channel="'+mc.id+'" data-channel-name="'+mc.icon+' '+mc.name+'"><span class="ch-icon">'+mc.icon+'</span><span class="ch-name">'+mc.name+'</span>'+((mc.badge?'<span class="ch-badge">'+mc.badge+'</span>':'')+(currentServer!=='dm'?'<span class="ch-gear" data-channel-id="'+mc.id+'" data-channel-name="'+mc.name+'">⚙️</span>':''))+'</div>'}}}else{html+='<div style="padding:8px 12px;font-size:11px;color:var(--text3);font-style:italic">暂无会议室</div>'}document.getElementById('channelList').innerHTML=html;if(first&&!findChannelById(currentChannel))selectChannel(first.id,first.icon+' '+first.name);renderMembers(s)}
function findChannelById(id){var s=serverData[currentServer];for(var sec in s.channels){var chs=s.channels[sec];for(var i=0;i<chs.length;i++){if(chs[i].id===id)return true}}return false}
function toggleSection(el){el.classList.toggle('collapsed');var n=el.nextElementSibling;while(n&&!n.classList.contains('channel-section')){n.style.display=n.style.display==='none'?'':'none';n=n.nextElementSibling}}
function renderMembers(s){var html='';s.members.onlineList.forEach(function(n){html+='<div class="member-item"><span class="member-dot online"></span>'+n+'</div>'});html+='<h4 style="margin-top:14px">离线 — '+s.members.offline+'</h4>';s.members.offlineList.forEach(function(n){html+='<div class="member-item"><span class="member-dot offline"></span>'+n+'</div>'});document.getElementById('memberList').innerHTML=html}
function renderMessages(){var msgs=getMessages(currentChannel);var html='<div class="msg-date-divider">2026年6月21日</div>';for(var i=0;i<msgs.length;i++){var m=msgs[i],cls=m.self?' self':'',st='';if(m.self&&m.status){var rc=m.status==='read'?' read':'',dots=m.status==='sent'?1:2;st='<div class="msg-status'+rc+'">';for(var d=0;d<dots;d++)st+='<span class="sdot"></span>';st+='</div>'}html+='<div class="msg-row'+cls+'"><div class="msg-avatar '+m.avatar+'">'+(m.avatar==='blue'?'🐾':m.avatar==='purple'?'👔':m.avatar==='green'?'🔧':m.avatar==='orange'?'😎':'👤')+'</div><div class="msg-bubble"><div class="msg-sender">'+m.sender+(m.tag?' <span style="color:var(--accent);font-size:10px;margin-left:4px">'+m.tag+'</span>':'')+'</div><div class="msg-text">'+m.text+'</div><div class="msg-time">'+m.time+'</div>'+st+'</div></div>'}document.getElementById('messages').innerHTML=html;document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight}

// ═══ Send ═══
function toggleUploadMenu(e){e.stopPropagation();document.getElementById('uploadPopup').classList.toggle('show')}
function handleFileUpload(e){document.getElementById('uploadPopup').classList.remove('show');var f=e.target.files[0];if(!f)return;var n=new Date(),t=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');var lb=f.type.indexOf('image/')===0?'🖼️ 照片':f.type.indexOf('video/')===0?'🎬 视频':'📁 文件';var r=document.createElement('div');r.className='msg-row self';r.innerHTML='<div class="msg-avatar orange">😎</div><div class="msg-bubble"><div class="msg-sender">我</div><div class="msg-text">'+lb+'：'+f.name+' ('+(f.size/1024).toFixed(1)+'KB)</div><div class="msg-time">'+t+'</div><div class="msg-status"><span class="sdot"></span></div></div>';document.getElementById('messages').appendChild(r);document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight}
function toggleChDropdown(e){e.stopPropagation();var d=document.getElementById('chDropdown');if(currentServer==='dm'){d.innerHTML='<div class="ch-dropdown-item" onclick="alert(\'打开好友列表\')">👤 好友列表</div>'}else{d.innerHTML='<div class="ch-dropdown-item" onclick="addChannel()">➕ 添加频道</div><div class="ch-dropdown-divider"></div><div class="ch-dropdown-item" onclick="addMeetingRoom()">📞 添加会议室</div>'}d.classList.toggle('show')}
function addChannel(){document.getElementById('chDropdown').classList.remove('show');var n=prompt('频道名称:');if(n){var s=serverData[currentServer],ks=Object.keys(s.channels),sec=ks[0]||'默认',id='ch-'+Date.now();if(!s.channels[sec])s.channels[sec]=[];s.channels[sec].push({icon:'💬',name:n,badge:'',id:id});renderChannels()}}
function addMeetingRoom(){document.getElementById('chDropdown').classList.remove('show');var n=prompt('会议室名称:');if(n){var s=serverData[currentServer],ks=Object.keys(s.channels),sec=ks[0]||'默认',id='meet-'+Date.now();if(!s.channels[sec])s.channels[sec]=[];s.channels[sec].push({icon:'📞',name:n,badge:'',id:id});renderChannels()}}
function sendMessage(){var inp=document.getElementById('msgInput'),msg=inp.value.trim();if(!msg)return;var n=new Date(),t=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');var r=document.createElement('div');r.className='msg-row self';r.innerHTML='<div class="msg-avatar orange">😎</div><div class="msg-bubble"><div class="msg-sender">我</div><div class="msg-text">'+msg+'</div><div class="msg-time">'+t+'</div><div class="msg-status"><span class="sdot"></span></div></div>';document.getElementById('messages').appendChild(r);document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;inp.value=''}
function handleSend(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
document.addEventListener('click',function(e){if(!e.target.closest('.chat-input-area'))document.getElementById('uploadPopup').classList.remove('show');if(!e.target.closest('.channels-header'))document.getElementById('chDropdown').classList.remove('show')});

// ═══ Search ═══
function toggleSearchBar(){var b=document.getElementById('searchBar');b.style.display=b.style.display==='flex'?'none':'flex';if(b.style.display==='flex'){document.getElementById('msgSearchInput').value='';setTimeout(function(){document.getElementById('msgSearchInput').focus()},100)}}
function searchMessages(){var q=document.getElementById('msgSearchInput').value.trim();if(!q)return;var all=document.getElementById('messages').querySelectorAll('.msg-row'),found=false;for(var i=0;i<all.length;i++){var t=all[i].querySelector('.msg-text');if(t&&t.textContent.toLowerCase().indexOf(q.toLowerCase())>=0){all[i].scrollIntoView({behavior:'smooth',block:'center'});all[i].style.outline='2px solid var(--primary)';setTimeout(function(el){el.style.outline=''},2000,all[i]);found=true;break}}if(!found)alert('未找到匹配消息')}

// ═══ Voice Call ═══
function renderVoiceCall(){var s=serverData[currentServer],m=s?s.members:{onlineList:['你']},ml='',ol=m.onlineList||['你'];for(var i=0;i<Math.min(ol.length,8);i++){var nm=ol[i],clr=['#6c5ce7','#22c55e','#f59e0b','#00d2ff','#a855f7','#ef4444','#8b5cf6','#ec4899'][i%8];ml+='<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:10px" onmouseover="this.style.background=\'rgba(255,255,255,.03)\'" onmouseout="this.style.background=\'transparent\'"><div style="width:36px;height:36px;border-radius:50%;background:'+clr+';display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;flex-shrink:0">👤<span style="position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#22c55e;border:2px solid var(--bg)"></span></div><div style="flex:1"><div style="font-size:13px;font-weight:500">'+nm+'</div></div><span style="font-size:11px;color:#22c55e">● 语音已连接</span></div>'}document.getElementById('messages').style.background='transparent';document.getElementById('messages').innerHTML='<div style="text-align:center;padding:24px 0 12px"><div style="font-size:40px;margin-bottom:8px">📞</div><h3 style="font-size:16px;font-weight:700">'+document.getElementById('chatTitle').textContent+'</h3><p style="font-size:12px;color:var(--text2)">语音已连接 · <span id="voiceDuration">00:00</span> · '+ol.length+'人在线</p></div><div style="padding:0 20px;display:flex;flex-direction:column;gap:2px;max-width:400px;margin:0 auto">'+ml+'</div>';var cb=document.getElementById('voiceControlBar');if(!cb){cb=document.createElement('div');cb.id='voiceControlBar';cb.innerHTML='<button class="voice-btn mic-on" onclick="toggleMic(this)" title="麦克风">🎙️</button><button class="voice-btn speaker-on" onclick="toggleSpeaker(this)" title="扬声器">🔊</button><button class="voice-btn hangup" onclick="hangupCall()" title="挂断" style="background:var(--red);color:#fff">📵</button><button class="voice-btn" onclick="toggleCamera(this)" title="视频">📹</button><button class="voice-btn" onclick="toggleScreenShare(this)" title="屏幕共享">🖥️</button>';cb.style.cssText='position:absolute;bottom:0;left:0;right:0;display:flex;gap:12px;justify-content:center;padding:16px;background:transparent;border-top:1px solid rgba(255,255,255,.04);z-index:10';document.querySelector('.chat-main').style.position='relative';document.querySelector('.chat-main').appendChild(cb)}cb.style.display='flex';if(window.voiceTimer)clearInterval(window.voiceTimer);var sec=0;window.voiceTimer=setInterval(function(){sec++;var m=String(Math.floor(sec/60)).padStart(2,'0'),s=String(sec%60).padStart(2,'0'),el=document.getElementById('voiceDuration');if(el)el.textContent=m+':'+s},1000)}
function toggleMic(el){var on=el.classList.toggle('mic-off');el.classList.toggle('mic-on',!on);el.textContent=on?'🎙️‍➖':'🎙️';el.style.opacity=on?'0.5':'1'}
function toggleSpeaker(el){el.classList.toggle('speaker-on')}
function toggleCamera(el){el.classList.toggle('cam-on');el.style.background=el.classList.contains('cam-on')?'var(--primary)':'';el.style.color=el.classList.contains('cam-on')?'#fff':''}
function toggleScreenShare(el){el.classList.toggle('screen-on');el.style.background=el.classList.contains('screen-on')?'var(--primary)':'';el.style.color=el.classList.contains('screen-on')?'#fff':''}
function hangupCall(){if(window.voiceTimer)clearInterval(window.voiceTimer);var b=document.getElementById('voiceControlBar');if(b)b.style.display='none';document.getElementById('messages').style.background='var(--msg-bg)';document.getElementById('messages').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:14px">通话已结束</div>'}
function startVoiceCall(){document.getElementById('chat-header-actions').style.display='none';document.getElementById('chat-input-area').style.display='none';renderVoiceCall()}

// ═══ Create Server ═══
var uploadedImage=null;
function openCreateModal(){document.getElementById('createModal').classList.add('show');document.getElementById('serverNameInput').value='';document.getElementById('createBtn').disabled=true;removeImage();setTimeout(function(){document.getElementById('serverNameInput').focus()},100)}
function closeCreateModal(){document.getElementById('createModal').classList.remove('show')}
function handleImageUpload(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){uploadedImage=ev.target.result;document.getElementById('previewImg').src=uploadedImage;document.getElementById('uploadPreview').classList.add('show');document.getElementById('uploadArea').classList.add('has-image')};r.readAsDataURL(f)}
function removeImage(){uploadedImage=null;document.getElementById('previewImg').src='';document.getElementById('uploadPreview').classList.remove('show');document.getElementById('uploadArea').classList.remove('has-image');document.getElementById('fileInput').value=''}
function updateCreateBtn(){document.getElementById('createBtn').disabled=!document.getElementById('serverNameInput').value.trim()}
function createServer(){var nm=document.getElementById('serverNameInput').value.trim();if(!nm)return;var id='server-'+Date.now();serverData[id]={name:nm,channels:{'默认':[{icon:'💬',name:'综合讨论',badge:'',id:id+'-general'}]}};var sb=document.getElementById('serverBar'),ab=sb.querySelector('[data-server="add"]'),div=ab.previousElementSibling,ns=document.createElement('div');ns.className='server-icon';ns.dataset.server=id;ns.setAttribute('onclick','selectServer(this)');if(uploadedImage){ns.innerHTML='<div class="server-indicator"></div><img src="'+uploadedImage+'" style="width:100%;height:100%;border-radius:4px;object-fit:cover">';ns.style.background='none';ns.style.overflow='hidden';ns.style.padding='0'}else{ns.innerHTML='<div class="server-indicator"></div>🌌'}sb.insertBefore(ns,div);closeCreateModal();selectServer(ns)}
function openJoinModal(){document.getElementById('createModal').classList.remove('show');document.getElementById('joinModal').classList.add('show');document.getElementById('inviteLinkInput').value='';document.getElementById('joinBtn').disabled=true;setTimeout(function(){document.getElementById('inviteLinkInput').focus()},100)}
function closeJoinModal(){document.getElementById('joinModal').classList.remove('show')}
function backToCreateModal(){document.getElementById('joinModal').classList.remove('show');document.getElementById('createModal').classList.add('show')}
function updateJoinBtn(){document.getElementById('joinBtn').disabled=!document.getElementById('inviteLinkInput').value.trim()}
function joinServer(){var lnk=document.getElementById('inviteLinkInput').value.trim();if(!lnk)return;var id='server-'+Date.now();serverData[id]={name:'已加入的服务器',channels:{'默认':[{icon:'💬',name:'综合讨论',badge:'',id:id+'-general'}]}};var sb=document.getElementById('serverBar'),ab=sb.querySelector('[data-server="add"]'),div=ab.previousElementSibling,ns=document.createElement('div');ns.className='server-icon';ns.dataset.server=id;ns.setAttribute('onclick','selectServer(this)');ns.innerHTML='<div class="server-indicator"></div>🔗';sb.insertBefore(ns,div);closeJoinModal();selectServer(ns)}
document.addEventListener('click',function(e){if(e.target.id==='createModal')closeCreateModal();if(e.target.id==='joinModal')closeJoinModal()});

// ═══ Channel List Click ═══
document.getElementById('channelList').addEventListener('click',function(e){var g=e.target.closest('.ch-gear');if(g){e.stopPropagation();var id=g.dataset.channelId,nm=g.dataset.channelName;if(id&&nm){alert('频道设置: '+nm)}return}var it=e.target.closest('.channel-item');if(it){var cid=it.dataset.channel,cn=it.dataset.channelName;if(cid&&cn)selectChannel(cid,cn)}});

// ═══ Context Menu ═══
var __ctxTarget=null;
document.addEventListener('contextmenu',function(e){var el=e.target;while(el&&el!==document.documentElement){if(el.nodeType===1&&el.matches&&el.matches('.msg-bubble')){e.preventDefault();e.stopPropagation();__ctxTarget=el.closest('.msg-row');var m=document.getElementById('ctxMenu'),ei=document.getElementById('ctxEditItem');if(m){if(ei&&__ctxTarget)ei.style.display=__ctxTarget.classList.contains('self')?'':'none';m.style.display='block';m.style.left=e.clientX+'px';m.style.top=e.clientY+'px'}return false}el=el.parentElement}},{capture:true,passive:false});
document.addEventListener('click',function(){var m=document.getElementById('ctxMenu');if(m)m.style.display='none'});
function ctxSelect(){if(__ctxTarget){__ctxTarget.style.outline='2px solid var(--accent)';setTimeout(function(){if(__ctxTarget)__ctxTarget.style.outline=''},2000)}document.getElementById('ctxMenu').style.display='none'}
function ctxCopy(){if(__ctxTarget){var t=__ctxTarget.querySelector('.msg-text');if(t)navigator.clipboard.writeText(t.textContent)}document.getElementById('ctxMenu').style.display='none'}
function ctxEdit(){if(__ctxTarget){var t=__ctxTarget.querySelector('.msg-text');if(t){var n=prompt('编辑消息:',t.textContent);if(n!==null)t.textContent=n}}document.getElementById('ctxMenu').style.display='none'}
function ctxDelete(){if(__ctxTarget){if(confirm('确定删除这条消息？'))__ctxTarget.remove()}document.getElementById('ctxMenu').style.display='none'}
function ctxReply(){if(__ctxTarget){var t=__ctxTarget.querySelector('.msg-text'),txt=t?t.textContent:'',inp=document.getElementById('msgInput');if(inp){inp.value='> '+txt.substring(0,80)+'\n';inp.focus()}}document.getElementById('ctxMenu').style.display='none'}
function ctxReact(){if(__ctxTarget){var em=prompt('输入表情:','👍');if(em){var r=document.createElement('span');r.textContent=em;r.style.cssText='font-size:14px;margin-left:6px';__ctxTarget.appendChild(r)}}document.getElementById('ctxMenu').style.display='none'}

// ═══ Init ═══
renderChannels();

// ═══ LED Stars ═══
(function(){var c=document.getElementById('bgStars');if(!c)return;var cl=['#00d2ff','#ff00ff','#6c5ce7','#00ff88','#ff4488','#a855f7','#00e5ff','#ff3399'];for(var i=0;i<40;i++){var s=document.createElement('div');s.style.cssText='position:fixed;pointer-events:none;z-index:0;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;width:'+(30+Math.random()*80)+'px;height:'+(1+Math.random()*3)+'px;background:'+cl[Math.floor(Math.random()*cl.length)]+';border-radius:2px;opacity:0;box-shadow:0 0 '+(4+Math.random()*8)+'px currentColor;animation:ledBlink 1.5s ease-in-out infinite;animation-delay:'+(Math.random()*1.5)+'s;'+(Math.random()>0.5?'transform:rotate(90deg);':'');c.appendChild(s)}for(var j=0;j<80;j++){var d=document.createElement('div');d.style.cssText='position:fixed;pointer-events:none;z-index:0;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;width:'+(1+Math.random()*3)+'px;height:'+(1+Math.random()*3)+'px;border-radius:50%;background:'+cl[Math.floor(Math.random()*cl.length)]+';opacity:0;box-shadow:0 0 '+(3+Math.random()*6)+'px currentColor;animation:ledBlink 1.5s ease-in-out infinite;animation-delay:'+(Math.random()*1.5)+'s;';c.appendChild(d)}})();
</script>
